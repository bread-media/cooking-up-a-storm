backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

site_url: https://cooking-up-a-storm.netlify.app

collections:
  - name: "production"
    label: "Production Hub"
    files:

      # ── HERO / OVERVIEW ──
      - name: "overview"
        label: "Overview"
        file: "_data/overview.json"
        fields:
          - { label: "Film Title", name: "title", widget: "string", default: "Cooking Up A Storm" }
          - { label: "Logline", name: "logline", widget: "text" }
          - { label: "Director", name: "director", widget: "string", default: "Hantz Leger" }
          - { label: "Shoot Date", name: "shoot_date", widget: "string", default: "TBC" }
          - { label: "Format", name: "format", widget: "string", default: "Short Film" }
          - { label: "Genre", name: "genre", widget: "string", default: "Dark Comedy" }
          - { label: "Production Company", name: "company", widget: "string", default: "Bread Media" }

      # ── SYNOPSIS ──
      - name: "synopsis"
        label: "Synopsis"
        file: "_data/synopsis.json"
        fields:
          - { label: "Synopsis", name: "text", widget: "text" }

      # ── SCRIPT ──
      - name: "script"
        label: "Script"
        file: "_data/script.json"
        fields:
          - { label: "Script Title", name: "title", widget: "string", default: "Cooking Up A Storm — Final Draft" }
          - { label: "Download URL", name: "url", widget: "string" }
          - { label: "Version / Notes", name: "notes", widget: "string", default: "PDF · Google Drive" }

      # ── CHARACTERS ──
      - name: "characters"
        label: "Characters"
        file: "_data/characters.json"
        fields:
          - label: "Characters"
            name: "characters"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Age / Role", name: "role", widget: "string" }
              - { label: "Background", name: "background", widget: "text" }
              - { label: "Director's Notes", name: "notes", widget: "text" }
              - { label: "Reference Video URL", name: "video_url", widget: "string", required: false }

      # ── MOODBOARD ──
      - name: "moodboard"
        label: "Moodboard"
        file: "_data/moodboard.json"
        fields:
          - label: "Images (max 6)"
            name: "images"
            widget: "list"
            max: 6
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption (optional)", name: "caption", widget: "string", required: false }

      # ── CALL SHEET ──
      - name: "callsheet"
        label: "Call Sheet"
        file: "_data/callsheet.json"
        fields:
          - { label: "Show Call Sheet", name: "visible", widget: "boolean", default: false }
          - { label: "Day Number", name: "day", widget: "string", default: "Day 1 of 1" }
          - { label: "General Call Time", name: "general_call", widget: "string", default: "TBC" }
          - { label: "Shooting Call", name: "shooting_call", widget: "string", default: "TBC" }
          - { label: "General Notes", name: "notes", widget: "text" }
          - label: "Schedule Times"
            name: "times"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }

      # ── SCHEDULE ──
      - name: "schedule"
        label: "Schedule"
        file: "_data/schedule.json"
        fields:
          - { label: "Show Schedule", name: "visible", widget: "boolean", default: false }
          - label: "Scenes"
            name: "scenes"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Start Time", name: "start", widget: "string" }
              - { label: "Scene Number", name: "scene_num", widget: "string" }
              - { label: "Heading (e.g. INT. KITCHEN)", name: "heading", widget: "string" }
              - { label: "Description", name: "description", widget: "string" }
              - { label: "Day/Night", name: "dn", widget: "select", options: ["DAY", "NIGHT"] }
              - { label: "Cast (e.g. 1, 2)", name: "cast", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Estimated Time", name: "est", widget: "string" }

      # ── TALENT ──
      - name: "talent"
        label: "Talent"
        file: "_data/talent.json"
        fields:
          - { label: "Show Talent", name: "visible", widget: "boolean", default: false }
          - label: "Cast Members"
            name: "talent"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Actor Name", name: "name", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Role (character name)", name: "role", widget: "string" }
              - { label: "Pickup Time", name: "pickup", widget: "string", default: "TBC" }
              - { label: "Call Time", name: "call", widget: "string", default: "TBC" }

      # ── CREW ──
      - name: "crew"
        label: "Crew"
        file: "_data/crew.json"
        fields:
          - { label: "Show Crew", name: "visible", widget: "boolean", default: false }
          - label: "Departments"
            name: "departments"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Department Name", name: "dept", widget: "string" }
              - label: "Members"
                name: "members"
                widget: "list"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Role / Title", name: "role", widget: "string" }
                  - { label: "Email", name: "email", widget: "string", required: false }
                  - { label: "Phone", name: "phone", widget: "string", required: false }
                  - { label: "Call Time", name: "call", widget: "string", default: "TBC" }

      # ── LOCATIONS ──
      - name: "locations"
        label: "Locations"
        file: "_data/locations.json"
        fields:
          - { label: "Show Locations", name: "visible", widget: "boolean", default: false }
          - label: "Locations"
            name: "locations"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Location Name / Label", name: "name", widget: "string" }
              - { label: "Set Address", name: "set_address", widget: "string" }
              - { label: "Parking", name: "parking", widget: "string" }
              - { label: "Parking Notes", name: "parking_notes", widget: "string", required: false }
              - { label: "Nearest Hospital", name: "hospital", widget: "string" }
              - { label: "Hospital Phone", name: "hospital_phone", widget: "string", required: false }
